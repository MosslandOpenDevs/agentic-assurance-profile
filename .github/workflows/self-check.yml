name: self-check

on: [push, pull_request]

permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The validator supports Python 3.10+ (scripts/validate.py); the
        # hash lock is universal (environment markers), so one file covers
        # every runner version.
        python-version: ["3.10", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The review-only diagnostic verifier reads exact bound Git objects.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hash-locked validator dependencies
        run: pip install --require-hashes -r requirements-ci.txt

      - name: Run profile self-check
        run: python scripts/validate.py self-check

      - name: Run validator regression tests
        run: python -m unittest discover -s tests -v

  # Static analysis of the workflow files themselves (expression mistakes,
  # invalid contexts, shellcheck of run: blocks). Digest-pinned image —
  # a digest is immutable, matching the action SHA-pin policy.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint workflow files
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color
