# Reusable validation workflow for adopting repositories.
#
# Copy this caller into your repository as .github/workflows/assurance.yml
# (docs/ADOPTION.md section 3.4):
#
#   # .github/workflows/assurance.yml
#   name: assurance
#   on:
#     push:
#     pull_request:
#       types: [opened, synchronize, reopened, edited, ready_for_review]
#   jobs:
#     assurance:
#       uses: MosslandOpenDevs/agentic-assurance-profile/.github/workflows/adopter-validate.yml@REPLACE_WITH_FULL_40_CHARACTER_COMMIT_SHA
#
# The `edited` type matters: the drift job reads invariant mentions and
# no-impact statements from the PR description, so editing the description
# must re-run the check — the default pull_request types would leave a stale
# verdict standing.
#
# The @ reference is pinned to the same full 40-character commit SHA as
# upstream.commit in your adoption file and is updated together with the pin;
# the pin-read step errors when the two disagree, and a caller that pins by
# tag or branch instead of a full SHA is rejected outright.
#
# If your adoption file is not at the default location, pass it explicitly:
#
#       with:
#         adoption-file: path/to/adoption.yaml
#
# TRUST BOUNDARY (what this workflow can and cannot guarantee):
# the validator code executed on the runner is ALWAYS this workflow's own
# repository at this workflow's own commit (job.workflow_repository /
# job.workflow_sha — verified to be the canonical upstream, CANONICAL
# below, before use). Nothing read from the adopter's tree ever selects the
# code that runs: the adoption file's upstream fields are validated as
# data, and upstream.commit must equal the workflow's own SHA. Every
# dependency install is hash-locked, every action is pinned to a full
# commit SHA, the token is contents:read, and no checkout persists
# credentials.
#
# What this workflow CANNOT defend: the caller workflow file itself lives
# in the adopting repository, and pull_request events run the PR's version
# of it — a pull request can change the @ reference (or replace the caller
# entirely) and thereby run an older or different workflow. That boundary
# is governed by repository controls, not by this file: keep
# .github/workflows/ under CODEOWNERS with required code-owner review (the
# adopter bundle's CODEOWNERS template covers the caller), and see
# docs/ADOPTION.md section 3.4 for the organization-level options
# (Actions allow-lists; organization rulesets with required workflows on
# GitHub Team/Enterprise). A caller swap is always visible in the PR diff.
#
# The job.workflow_* contexts this workflow relies on are unavailable on
# GitHub Enterprise Server — this workflow targets GitHub.com.
#
# An adopter who forks the profile must run their own copy of this
# workflow with CANONICAL (in every job) changed to their fork.
#
# Two validation jobs run on every event. `structure` (check name
# "assurance / structure" with the caller above) is the structural
# validation: everything except adoption-stage enforcement, i.e. a
# DRAFT-equivalent pass/fail. `declared-stage` enforces the requirements of
# the `adoption_stage` declared in the adoption file; it is skipped entirely
# when the declared stage is DRAFT or absent. The check is deliberately NOT
# named "conformance": it enforces whatever stage is declared, so it is
# green at HUMAN_REVIEWED too — a green check must not read as a
# conformance statement. Renames across releases: "assurance / validate"
# (pre-v0.2.0) became "assurance / structure"; "assurance / conformance"
# (v0.2.0) is now "assurance / declared-stage" — update branch protection
# when re-pinning.
#
# On pull_request events an additional `drift` job routes the change set
# against the optional `components:` map in the adoption file (impact
# routing): it warns when a mapped component changes without an assurance
# update referencing its invariants, an invariant mention, or an explicit
# no-impact statement in the PR description. It also screens the assurance
# policy against the base branch — the adoption declaration (stage
# downgrade, pin change, component removal/narrowing, owner/path moves)
# and the registers themselves, by stable ID (deleted entries, whole
# register removal, severity/status/proof-tier downgrades, evidence and
# claim-basis removal, a cleared CONTRADICTED status, and residual/defeater
# closing dispositions) — failing unless the PR description carries an
# explicit `Assurance policy change: <why>` line;
# when the base declaration's stage is HUMAN_REVIEWED or CONFORMANT the
# findings stay errors even when acknowledged. Push-event callers are
# unaffected. To turn routing warnings into failures:
#
#       with:
#         strict-drift: true

name: adopter-validate

on:
  workflow_call:
    inputs:
      adoption-file:
        description: Path to the adoption file in the calling repository.
        type: string
        required: false
        default: .agentic-assurance/adoption.yaml
      strict-drift:
        description: Treat unrouted component impact as an error in the pull-request drift job.
        type: boolean
        required: false
        default: false

# Least privilege: the validator only reads the adopter's tree and queries a
# public API for staleness. It never needs write access to anything.
permissions:
  contents: read

jobs:
  # Structural validation (formerly job id `validate`; the required check is
  # now "assurance / structure"): the full adopter validation minus
  # adoption-stage enforcement (--ignore-stage), so this check's pass/fail
  # is stage-independent (a DRAFT-equivalent verdict).
  structure:
    runs-on: ubuntu-latest
    outputs:
      adoption_stage: ${{ steps.pin.outputs.adoption_stage }}
    steps:
      - name: Check out adopting repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The workflow's own identity is the trust anchor: everything below
      # executes code from job.workflow_repository @ job.workflow_sha, so
      # first pin that identity down. The suffix check on job.workflow_ref
      # rejects callers that pin by tag or branch — a tag can move even
      # when it currently resolves to the same commit.
      - name: Verify workflow identity
        env:
          WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          WORKFLOW_REF: ${{ job.workflow_ref }}
          WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          if [ -z "$WORKFLOW_SHA" ] || [ -z "$WORKFLOW_REPOSITORY" ] || [ -z "$WORKFLOW_REF" ]; then
            echo "::error::job.workflow_repository / job.workflow_ref / job.workflow_sha are unavailable — this workflow requires GitHub.com (these contexts do not exist on GitHub Enterprise Server) and must be invoked via workflow_call."
            exit 1
          fi
          if [ "$WORKFLOW_REPOSITORY" != "MosslandOpenDevs/agentic-assurance-profile" ]; then
            echo "::error::This workflow is running from $WORKFLOW_REPOSITORY, not the canonical upstream. A fork must run its own copy with the CANONICAL constants changed (see the header comment)."
            exit 1
          fi
          case "$WORKFLOW_REF" in
            *"@${WORKFLOW_SHA}")
              echo "workflow identity: $WORKFLOW_REPOSITORY @ $WORKFLOW_SHA (caller pins the full SHA)"
              ;;
            *)
              echo "::error::The caller references this workflow as '$WORKFLOW_REF' — pin the full 40-character commit SHA (docs/ADOPTION.md section 3.4), not a tag or branch."
              exit 1
              ;;
          esac

      # The trusted checkout doubles as the pinned profile: the pin-read
      # step below enforces upstream.commit == job.workflow_sha, so this
      # workflow's own source IS the pinned commit. No adopter-influenced
      # code or dependency is installed before this point (the v0.2.1
      # version-pinned pyyaml bootstrap is gone — the pin reader now runs
      # on the hash-locked set from the trusted checkout).
      - name: Check out this workflow's profile source (trusted)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .assurance-profile-pin
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install hash-locked validator dependencies
        run: pip install --require-hashes -r .assurance-profile-pin/requirements-ci.txt

      - name: Read and verify upstream pin
        id: pin
        env:
          ADOPTION_FILE: ${{ inputs.adoption-file }}
          WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          python - "$ADOPTION_FILE" <<'EOF'
          import os
          import sys

          import yaml

          # The declared repository is validated as data, never used to
          # choose the code that executes on the runner.
          CANONICAL = "MosslandOpenDevs/agentic-assurance-profile"

          path = sys.argv[1]
          with open(path, encoding="utf-8") as f:
              adoption = yaml.safe_load(f)

          if not isinstance(adoption, dict):
              raise SystemExit(f"{path}: adoption file is empty or not a YAML mapping; see docs/ADOPTION.md.")
          upstream = adoption.get("upstream")
          if not isinstance(upstream, dict):
              raise SystemExit(f"{path}: 'upstream' is missing or not a mapping; see docs/ADOPTION.md.")
          missing = [key for key in ("repository", "commit", "version") if key not in upstream]
          if missing:
              raise SystemExit(f"{path}: 'upstream' is missing required key(s): {', '.join(missing)}; see docs/ADOPTION.md.")

          if upstream["repository"] != CANONICAL:
              raise SystemExit(
                  f"{path}: upstream.repository is {upstream['repository']!r}, but this reusable "
                  f"workflow only validates against the canonical upstream {CANONICAL!r}. If you "
                  "pin a fork of the profile, run your own copy of adopter-validate.yml with "
                  "CANONICAL changed to your fork."
              )

          commit = str(upstream["commit"])
          if not (len(commit) == 40 and all(c in "0123456789abcdef" for c in commit)):
              raise SystemExit(f"{path}: upstream.commit must be a full 40-character lowercase hex SHA; see docs/ADOPTION.md.")

          # The documented same-change rule, enforced: the caller's @ SHA
          # (this workflow's own commit) and the adoption pin move together.
          workflow_sha = os.environ["WORKFLOW_SHA"]
          if commit != workflow_sha:
              raise SystemExit(
                  f"{path}: upstream.commit is {commit} but the caller pins this reusable "
                  f"workflow at {workflow_sha}. Update upstream.version, upstream.commit, and "
                  "the caller's @ reference in the same change (docs/ADOPTION.md section 3.4)."
              )

          # Single-line, like commit and adoption_stage: every value written
          # to $GITHUB_OUTPUT must be validated against output injection.
          version = str(upstream["version"])
          if not version.strip() or "\n" in version or "\r" in version:
              raise SystemExit(f"{path}: upstream.version must be a non-empty single-line string; see docs/ADOPTION.md.")

          stage = adoption.get("adoption_stage", "DRAFT")
          if not isinstance(stage, str) or not stage.strip() or "\n" in stage or "\r" in stage:
              raise SystemExit(f"{path}: 'adoption_stage' must be a single-line string when present; see docs/ADOPTION.md.")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"version={version}\n")
              out.write(f"adoption_stage={stage}\n")
          EOF

      # A release identifier can appear in more than one commit's VERSION file
      # (the release PR's branch commit and the merge commit the tag points to).
      # Only the tag commit is the canonical pin; enforce that mechanically.
      # The pinned commit is job.workflow_sha — proven equal to
      # upstream.commit by the pin-read step above.
      - name: Verify release pin matches its tag
        if: ${{ steps.pin.outputs.version != 'unreleased' }}
        env:
          PINNED_VERSION: ${{ steps.pin.outputs.version }}
          PINNED_COMMIT: ${{ job.workflow_sha }}
        run: |
          set -e
          if ! git -C .assurance-profile-pin fetch --quiet --depth 1 origin "refs/tags/${PINNED_VERSION}:refs/tags/${PINNED_VERSION}"; then
            echo "::error::Release tag $PINNED_VERSION does not exist upstream — a release version pin must reference a published tag."
            exit 1
          fi
          TAG_SHA=$(git -C .assurance-profile-pin rev-list -n1 "refs/tags/${PINNED_VERSION}")
          if [ "$TAG_SHA" != "$PINNED_COMMIT" ]; then
            echo "::error::upstream.commit ($PINNED_COMMIT) is not the commit tag $PINNED_VERSION points to ($TAG_SHA). Pin the tag commit: git rev-list -n1 $PINNED_VERSION."
            exit 1
          fi
          echo "pin matches tag $PINNED_VERSION ($TAG_SHA)"

      - name: Validate against the pinned profile
        env:
          ADOPTION_FILE: ${{ inputs.adoption-file }}
          REPO_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          VISIBILITY_FLAG=""
          if [ -n "$REPO_VISIBILITY" ]; then
            VISIBILITY_FLAG="--repo-visibility $REPO_VISIBILITY"
          fi
          # shellcheck disable=SC2086  # VISIBILITY_FLAG splits into flag+value on purpose
          python .assurance-profile-pin/scripts/validate.py adopter \
            --adoption "$ADOPTION_FILE" \
            --project-root . \
            --schemas .assurance-profile-pin/schemas \
            --profile-checkout .assurance-profile-pin \
            --ignore-stage \
            $VISIBILITY_FLAG

      - name: Check pin staleness (non-blocking)
        continue-on-error: true
        env:
          PINNED_VERSION: ${{ steps.pin.outputs.version }}
        run: |
          python - <<'EOF'
          import json
          import os
          import re
          import urllib.request

          # Fixed to the canonical upstream — never a value from the adoption file.
          CANONICAL = "MosslandOpenDevs/agentic-assurance-profile"

          def order_key(tag):
              """Total order over pin strings: 'unreleased' sorts before every
              release, and a -rc.N pre-release sorts before its base release."""
              if tag == "unreleased":
                  return (0, 0, 0, 0, 0, 0)
              match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)(?:-rc\.(\d+))?", tag)
              if match is None:
                  raise ValueError(f"unrecognized version string {tag!r}")
              major, minor, patch, rc = match.groups()
              if rc is None:
                  return (1, int(major), int(minor), int(patch), 1, 0)
              return (1, int(major), int(minor), int(patch), 0, int(rc))

          pinned = os.environ["PINNED_VERSION"]
          url = f"https://api.github.com/repos/{CANONICAL}/releases/latest"
          try:
              with urllib.request.urlopen(url, timeout=10) as response:
                  latest = json.load(response).get("tag_name", "")
          except Exception as exc:
              print(f"Staleness check skipped: could not query {url} ({exc}).")
              raise SystemExit(0)
          if not latest:
              raise SystemExit(0)
          try:
              trailing = order_key(pinned) < order_key(latest)
          except ValueError as exc:
              print(f"Staleness check skipped: {exc}.")
              raise SystemExit(0)
          if trailing:
              print(
                  f"::notice::Pinned profile version {pinned} trails the latest "
                  f"release {latest}. Upgrade through explicit project change "
                  "review (PROFILE.md section 16)."
              )
          EOF

  # Declared-stage enforcement: the full stage-enforcing validation (no
  # --ignore-stage). Green means "the declared adoption_stage's requirements
  # are met" — at HUMAN_REVIEWED as well as CONFORMANT — which is why the
  # check is not named "conformance". The job-level `if` gates on the
  # adoption_stage output of the structure job's pin step (default DRAFT
  # when absent), so DRAFT adopters skip this job entirely and the
  # "assurance / declared-stage" check reports skipped rather than passed.
  # Race-free: both jobs run the workflow's own commit, so the gating value
  # cannot diverge from the adoption file this job re-reads. The implicit
  # success() in the `if` also skips this job when structure failed. Stage
  # self-downgrade in a PR (CONFORMANT -> DRAFT would skip this job) is
  # caught by the drift job's policy regression check.
  declared-stage:
    needs: structure
    if: needs.structure.outputs.adoption_stage != 'DRAFT'
    runs-on: ubuntu-latest
    steps:
      - name: Check out adopting repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify workflow identity
        env:
          WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          WORKFLOW_REF: ${{ job.workflow_ref }}
          WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          if [ -z "$WORKFLOW_SHA" ] || [ -z "$WORKFLOW_REPOSITORY" ] || [ -z "$WORKFLOW_REF" ]; then
            echo "::error::job.workflow_* contexts are unavailable — this workflow requires GitHub.com and must be invoked via workflow_call."
            exit 1
          fi
          if [ "$WORKFLOW_REPOSITORY" != "MosslandOpenDevs/agentic-assurance-profile" ]; then
            echo "::error::This workflow is running from $WORKFLOW_REPOSITORY, not the canonical upstream."
            exit 1
          fi
          case "$WORKFLOW_REF" in
            *"@${WORKFLOW_SHA}") : ;;
            *)
              echo "::error::The caller references this workflow as '$WORKFLOW_REF' — pin the full 40-character commit SHA."
              exit 1
              ;;
          esac

      - name: Check out this workflow's profile source (trusted)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .assurance-profile-pin
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install hash-locked validator dependencies
        run: pip install --require-hashes -r .assurance-profile-pin/requirements-ci.txt

      - name: Verify upstream pin matches this workflow
        env:
          ADOPTION_FILE: ${{ inputs.adoption-file }}
          WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          python - "$ADOPTION_FILE" <<'EOF'
          import os
          import sys

          import yaml

          CANONICAL = "MosslandOpenDevs/agentic-assurance-profile"

          path = sys.argv[1]
          with open(path, encoding="utf-8") as f:
              adoption = yaml.safe_load(f)

          if not isinstance(adoption, dict):
              raise SystemExit(f"{path}: adoption file is empty or not a YAML mapping; see docs/ADOPTION.md.")
          upstream = adoption.get("upstream")
          if not isinstance(upstream, dict):
              raise SystemExit(f"{path}: 'upstream' is missing or not a mapping; see docs/ADOPTION.md.")
          if upstream.get("repository") != CANONICAL:
              raise SystemExit(
                  f"{path}: upstream.repository is {upstream.get('repository')!r}, but this "
                  f"reusable workflow only validates against the canonical upstream {CANONICAL!r}."
              )
          commit = str(upstream.get("commit", ""))
          if commit != os.environ["WORKFLOW_SHA"]:
              raise SystemExit(
                  f"{path}: upstream.commit is {commit!r} but the caller pins this reusable "
                  f"workflow at {os.environ['WORKFLOW_SHA']} — update both in the same change."
              )
          EOF

      - name: Enforce the declared adoption stage
        env:
          ADOPTION_FILE: ${{ inputs.adoption-file }}
          REPO_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          VISIBILITY_FLAG=""
          if [ -n "$REPO_VISIBILITY" ]; then
            VISIBILITY_FLAG="--repo-visibility $REPO_VISIBILITY"
          fi
          # shellcheck disable=SC2086  # VISIBILITY_FLAG splits into flag+value on purpose
          python .assurance-profile-pin/scripts/validate.py adopter \
            --adoption "$ADOPTION_FILE" \
            --project-root . \
            --schemas .assurance-profile-pin/schemas \
            --profile-checkout .assurance-profile-pin \
            $VISIBILITY_FLAG

  # Impact routing and policy regression (pull requests only). The PR body
  # and both SHAs are passed through environment variables, never
  # interpolated into scripts.
  drift:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out adopting repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify workflow identity
        env:
          WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          WORKFLOW_REF: ${{ job.workflow_ref }}
          WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          if [ -z "$WORKFLOW_SHA" ] || [ -z "$WORKFLOW_REPOSITORY" ] || [ -z "$WORKFLOW_REF" ]; then
            echo "::error::job.workflow_* contexts are unavailable — this workflow requires GitHub.com and must be invoked via workflow_call."
            exit 1
          fi
          if [ "$WORKFLOW_REPOSITORY" != "MosslandOpenDevs/agentic-assurance-profile" ]; then
            echo "::error::This workflow is running from $WORKFLOW_REPOSITORY, not the canonical upstream."
            exit 1
          fi
          case "$WORKFLOW_REF" in
            *"@${WORKFLOW_SHA}") : ;;
            *)
              echo "::error::The caller references this workflow as '$WORKFLOW_REF' — pin the full 40-character commit SHA."
              exit 1
              ;;
          esac

      - name: Check out this workflow's profile source (trusted)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .assurance-profile-pin
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install hash-locked validator dependencies
        run: pip install --require-hashes -r .assurance-profile-pin/requirements-ci.txt

      # Three-dot diff: the files this PR changes relative to the merge base,
      # unaffected by unrelated commits that landed on the base branch since
      # the PR branched. --name-status -z rather than --name-only: a rename
      # or copy lists BOTH source and destination (with --name-only a rename
      # out of a mapped path would only show the destination and escape the
      # component's globs), and NUL separation keeps unusual filenames intact.
      - name: Compute changed files (rename-safe)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --name-status -z "$BASE_SHA...$HEAD_SHA" > "$RUNNER_TEMP/name-status.z"
          python - "$RUNNER_TEMP/name-status.z" > "$RUNNER_TEMP/changed-files.txt" <<'EOF'
          import sys

          raw = open(sys.argv[1], "rb").read().decode("utf-8", "surrogateescape")
          tokens = raw.split("\0")
          paths = []
          index = 0
          while index < len(tokens) and tokens[index]:
              status = tokens[index]
              # R (rename) and C (copy) records carry two paths (source,
              # destination); both count as changed so code cannot move out
              # of a mapped path unseen.
              take = 2 if status[:1] in ("R", "C") else 1
              paths.extend(tokens[index + 1 : index + 1 + take])
              index += 1 + take
          for path in paths:
              print(path)
          EOF

      - name: Write PR description to a file
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > "$RUNNER_TEMP/pr-body.txt"

      # The base branch's adoption declaration and registers (for the policy
      # regression check) come from a detached worktree of the base SHA, and
      # the diff of the assurance artifacts is scoped by the paths BOTH
      # declarations actually name (custom `paths:` mappings included), not
      # just the default directories.
      - name: Materialize the base tree and compute the assurance diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ADOPTION_FILE: ${{ inputs.adoption-file }}
        run: |
          python - <<'EOF'
          import os
          import subprocess
          import sys

          sys.path.insert(0, ".assurance-profile-pin/scripts")
          import posixpath

          import yaml
          from validate import DEFAULT_PATHS, LITE_ASSURANCE_PATH, resolve_paths

          base_sha = os.environ["BASE_SHA"]
          head_sha = os.environ["HEAD_SHA"]
          adoption_file = os.environ["ADOPTION_FILE"]
          tmp = os.environ["RUNNER_TEMP"]

          def safe_relative(path):
              """Normalized in-tree relative path, or None if it escapes.

              The adoption paths are pull-request-controlled, and they flow
              into git pathspecs and base-worktree reads below. This MUST
              accept exactly what the validator's check_declared_paths
              accepts (any path resolving inside the project root) — a stray
              './' or in-tree '..' that the validator reads but this step
              rejects would silently drop that register from the base
              materialization, hiding its deletion from the policy diff.
              So normalize first (collapsing '.'/harmless '..'), then reject
              only genuine escapes: absolute paths, and paths that climb out
              of the tree.
              """
              if not isinstance(path, str) or not path or posixpath.isabs(path):
                  return None
              normalized = posixpath.normpath(path)
              if (
                  normalized == "."
                  or normalized == ".."
                  or normalized.startswith("../")
                  or posixpath.isabs(normalized)
              ):
                  return None
              return normalized

          # Fixed, in-tree literals; the adoption-declared paths are added
          # only after passing safe_relative.
          diff_scope = {"assurance", ".agentic-assurance"}
          diff_scope |= set(DEFAULT_PATHS.values()) | {LITE_ASSURANCE_PATH}
          adoption_rel = safe_relative(adoption_file)
          if adoption_rel is not None:
              diff_scope.add(adoption_rel)

          def declared_paths(adoption):
              if not isinstance(adoption, dict):
                  return {}
              return {
                  kind: rel
                  for kind, value in resolve_paths(adoption).items()
                  if (rel := safe_relative(value)) is not None
              }

          with open(adoption_file, encoding="utf-8") as handle:
              head_adoption = yaml.safe_load(handle)
          diff_scope |= set(declared_paths(head_adoption).values())

          # The base side is a detached worktree of the base SHA, not
          # per-file `git show` writes: `git show` renders a symlink blob as
          # its target-path string, so a symlinked register would
          # materialize as a regular file holding a path string, load as
          # unusable, and silently drop out of the policy diff. A worktree
          # preserves file modes, giving the base side the same filesystem
          # semantics as the head checkout (the validator's containment
          # check rejects register paths that resolve outside this root).
          # fetch-depth: 0 above guarantees the base SHA exists locally.
          base_root = os.path.realpath(os.path.join(tmp, "base-tree"))
          worktree = subprocess.run(
              ["git", "worktree", "add", "--detach", base_root, base_sha],
              capture_output=True,
          )
          if worktree.returncode != 0:
              sys.stderr.write(worktree.stderr.decode("utf-8", "replace"))
              print("::error::Could not materialize the base tree (git worktree add failed).")
              raise SystemExit(1)

          base_adoption_file = None
          if adoption_rel is not None:
              candidate = os.path.join(base_root, adoption_rel)
              if os.path.isfile(candidate):
                  # Defence in depth: adoption_rel passed safe_relative, but
                  # a symlink inside the base tree could resolve elsewhere.
                  resolved = os.path.realpath(candidate)
                  if not resolved.startswith(base_root + os.sep):
                      print("::error::The base adoption declaration resolves outside the base tree.")
                      raise SystemExit(1)
                  base_adoption_file = candidate
              elif os.path.lexists(candidate):
                  # Present but unreadable (e.g. a broken symlink): the
                  # policy baseline exists and cannot be read — fail closed
                  # rather than comparing against nothing.
                  print("::error::The base adoption declaration exists but is not a readable file.")
                  raise SystemExit(1)
          if base_adoption_file is None:
              print(
                  f"::notice::No adoption declaration at {adoption_file} on the base "
                  "branch — policy comparison skipped (new adoption, or a moved "
                  "declaration; a move should itself be treated as an assurance "
                  "policy change)."
              )
          else:
              with open(base_adoption_file, "rb") as handle:
                  base_bytes = handle.read()
              with open(os.path.join(tmp, "base-adoption.yaml"), "wb") as handle:
                  handle.write(base_bytes)
              base_adoption = yaml.safe_load(base_bytes)
              diff_scope |= set(declared_paths(base_adoption).values())

          # --literal-pathspecs: the scope entries are plain paths, never git
          # pathspec magic. Fail closed on a diff error rather than proceeding
          # with an empty (falsely "no change") diff.
          diff = subprocess.run(
              [
                  "git",
                  "--literal-pathspecs",
                  "diff",
                  f"{base_sha}...{head_sha}",
                  "--",
                  *sorted(diff_scope),
              ],
              capture_output=True,
          )
          if diff.returncode != 0:
              sys.stderr.write(diff.stderr.decode("utf-8", "replace"))
              print("::error::Could not compute the assurance diff (git diff failed).")
              raise SystemExit(1)
          with open(os.path.join(tmp, "assurance-diff.txt"), "wb") as handle:
              handle.write(diff.stdout)
          EOF

      - name: Route impact and screen policy against the component map
        env:
          ADOPTION_FILE: ${{ inputs.adoption-file }}
          STRICT_DRIFT: ${{ inputs.strict-drift }}
        run: |
          STRICT_FLAG=""
          if [ "$STRICT_DRIFT" = "true" ]; then
            STRICT_FLAG="--strict"
          fi
          BASE_FLAGS=""
          if [ -f "$RUNNER_TEMP/base-adoption.yaml" ]; then
            BASE_FLAGS="--base-adoption $RUNNER_TEMP/base-adoption.yaml --base-registers-root $RUNNER_TEMP/base-tree --project-root ."
          fi
          # shellcheck disable=SC2086  # BASE_FLAGS/STRICT_FLAG split into flags on purpose
          python .assurance-profile-pin/scripts/validate.py drift \
            --adoption "$ADOPTION_FILE" \
            --changed-files "$RUNNER_TEMP/changed-files.txt" \
            --pr-body "$RUNNER_TEMP/pr-body.txt" \
            --assurance-diff "$RUNNER_TEMP/assurance-diff.txt" \
            $BASE_FLAGS $STRICT_FLAG
